<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Mürekkep — AI Asistan</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,500;0,9..144,600;1,9..144,500&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root{
    --paper:#faf7f1; --paper-raised:#ffffff; --paper-sunken:#f1ece1;
    --ink:#1c1b1a; --ink-soft:#6b6459; --ink-faint:#a39b8c;
    --accent:#2f4f6f; --accent-soft:#dde6ec; --accent-strong:#1d3550;
    --warm:#c8662f; --warm-soft:#f3e0d2;
    --border:#e3dccc; --user-bubble:#efe7d8;
    --danger:#b3433a;
    --shadow:0 1px 2px rgba(28,27,26,.04), 0 4px 14px rgba(28,27,26,.06);
    --radius-lg:20px; --radius-md:14px; --radius-sm:9px;
    --font-display:'Fraunces', serif; --font-body:'Inter', sans-serif; --font-mono:'JetBrains Mono', monospace;
  }
  [data-theme="dark"]{
    --paper:#15151a; --paper-raised:#1d1d23; --paper-sunken:#101013;
    --ink:#ece8df; --ink-soft:#a9a399; --ink-faint:#6b675f;
    --accent:#8fb2d4; --accent-soft:#26323d; --accent-strong:#bcd5ec;
    --warm:#e8915c; --warm-soft:#3a2c20;
    --border:#33323a; --user-bubble:#272730;
    --danger:#e08178;
    --shadow:0 1px 2px rgba(0,0,0,.3), 0 4px 18px rgba(0,0,0,.35);
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  body, button, textarea, input{font-family:var(--font-body);}
  html{-webkit-tap-highlight-color:transparent;}
  body{
    background:var(--paper); color:var(--ink); height:100vh; display:flex; overflow:hidden;
    transition:background-color .25s ease, color .25s ease;
  }
  ::selection{background:var(--accent-soft);}
  *:focus-visible{outline:2px solid var(--accent); outline-offset:2px; border-radius:6px;}
  @media (prefers-reduced-motion: reduce){ *{animation-duration:.001ms !important; transition-duration:.001ms !important;} }

  /* ---------- Sidebar ---------- */
  .sidebar{
    width:272px; min-width:272px; background:var(--paper-sunken); display:flex; flex-direction:column;
    padding:18px 16px; border-right:1px solid var(--border); transition:transform .25s ease;
  }
  .brand{display:flex; align-items:center; gap:10px; padding:6px 6px 18px;}
  .brand-mark{width:34px; height:34px; flex:none;}
  .brand-name{font-family:var(--font-display); font-weight:600; font-size:1.2rem; letter-spacing:.2px;}
  .brand-sub{font-size:.7rem; color:var(--ink-faint); letter-spacing:.4px; text-transform:uppercase; margin-top:-2px;}

  .side-btn{
    background:var(--paper-raised); color:var(--ink); border:1px solid var(--border); padding:11px 16px;
    border-radius:999px; cursor:pointer; display:flex; align-items:center; gap:10px; font-size:.92rem;
    font-weight:500; transition:border-color .15s, transform .1s, background .15s;
  }
  .side-btn:hover{border-color:var(--accent); background:var(--accent-soft);}
  .side-btn:active{transform:scale(.98);}
  .side-btn svg{width:16px; height:16px; flex:none;}

  .side-divider{height:1px; background:var(--border); margin:18px 0;}
  .side-label{font-size:.72rem; color:var(--ink-faint); text-transform:uppercase; letter-spacing:.6px; padding:0 8px 8px;}
  .history-empty{
    flex:1; display:flex; flex-direction:column; align-items:flex-start; gap:6px; padding:8px;
    color:var(--ink-faint); font-size:.84rem; line-height:1.5;
  }

  .sidebar-foot{display:flex; flex-direction:column; gap:6px; margin-top:auto; padding-top:14px; border-top:1px solid var(--border);}
  .ghost-btn{
    background:transparent; border:none; color:var(--ink-soft); padding:9px 8px; border-radius:var(--radius-sm);
    cursor:pointer; display:flex; align-items:center; gap:10px; font-size:.86rem; text-align:left;
  }
  .ghost-btn:hover{background:var(--paper-raised); color:var(--ink);}
  .ghost-btn svg{width:16px; height:16px; flex:none;}

  /* ---------- Main ---------- */
  .main-content{flex:1; display:flex; flex-direction:column; background:var(--paper); min-width:0; position:relative;}
  .top-nav{
    padding:14px 22px; display:flex; justify-content:space-between; align-items:center;
    border-bottom:1px solid var(--border); flex:none; gap:12px;
  }
  .top-left{display:flex; align-items:center; gap:10px;}
  .menu-toggle{display:none; background:transparent; border:none; color:var(--ink); cursor:pointer; padding:6px;}
  .menu-toggle svg{width:22px; height:22px;}
  .top-title{font-size:.95rem; font-weight:600; color:var(--ink-soft);}
  .top-title b{color:var(--ink); font-family:var(--font-display); font-weight:600;}

  .tool-btn{
    background:var(--paper-raised); border:1px solid var(--border); color:var(--ink);
    padding:8px 14px; border-radius:999px; cursor:pointer; font-size:.85rem; font-weight:500;
    display:flex; align-items:center; gap:7px; transition:border-color .15s, background .15s;
  }
  .tool-btn:hover{border-color:var(--accent); background:var(--accent-soft);}
  .tool-btn svg{width:15px; height:15px;}
  .tool-btn.active{border-color:var(--warm); background:var(--warm-soft); color:var(--warm);}

  /* ---------- Workspace ---------- */
  .workspace{display:flex; flex:1; overflow:hidden;}
  .chat-container{flex:1; overflow-y:auto; padding:28px 20px 10px; display:flex; flex-direction:column; align-items:center; min-width:0;}
  .chat-container::-webkit-scrollbar{width:8px;}
  .chat-container::-webkit-scrollbar-thumb{background:var(--border); border-radius:8px;}
  .chat-box{width:100%; max-width:760px; display:flex; flex-direction:column; gap:22px; padding-bottom:14px;}

  .empty-state{
    margin:auto; text-align:center; max-width:420px; display:flex; flex-direction:column; align-items:center; gap:14px;
  }
  .empty-state .brand-mark{width:52px; height:52px;}
  .empty-state h1{font-family:var(--font-display); font-size:1.7rem; font-weight:500; font-style:italic; color:var(--ink);}
  .empty-state p{color:var(--ink-soft); font-size:.92rem; line-height:1.5;}

  .message-row{display:flex; width:100%; gap:13px; animation:rise .28s ease;}
  @keyframes rise{from{opacity:0; transform:translateY(6px);} to{opacity:1; transform:translateY(0);}}
  .user-row{justify-content:flex-end;}
  .user-row .message{
    background:var(--user-bubble); padding:12px 18px; border-radius:20px 20px 5px 20px; max-width:78%;
    font-size:.95rem; line-height:1.5; white-space:pre-wrap; word-break:break-word;
  }
  .bot-row{align-items:flex-start;}
  .bot-avatar{
    width:32px; height:32px; flex:none; border-radius:50%; background:var(--paper-raised);
    border:1px solid var(--border); display:flex; align-items:center; justify-content:center; margin-top:2px;
  }
  .bot-avatar svg{width:17px; height:17px;}
  .bot-row .message{
    max-width:88%; padding-top:5px; line-height:1.65; font-size:.95rem; word-break:break-word;
  }
  .bot-row .message p{margin:0 0 .6em;}
  .bot-row .message p:last-child{margin-bottom:0;}
  .bot-row .message ul{margin:.3em 0 .6em 1.1em;}
  .bot-row .message li{margin-bottom:.25em;}
  .bot-row .message strong{font-weight:600; color:var(--ink);}
  .bot-row .message code{
    background:var(--paper-sunken); border:1px solid var(--border); border-radius:5px; padding:.12em .4em;
    font-family:var(--font-mono); font-size:.85em;
  }
  .code-block{position:relative; margin:.5em 0;}
  .code-block pre{
    background:var(--paper-sunken); border:1px solid var(--border); border-radius:var(--radius-sm);
    padding:14px 16px; overflow-x:auto; font-family:var(--font-mono); font-size:.82rem; line-height:1.55;
  }
  .copy-btn{
    position:absolute; top:7px; right:7px; background:var(--paper-raised); border:1px solid var(--border);
    color:var(--ink-soft); font-size:.7rem; padding:4px 9px; border-radius:6px; cursor:pointer;
    display:flex; align-items:center; gap:5px; font-family:var(--font-body);
  }
  .copy-btn:hover{color:var(--ink); border-color:var(--accent);}
  .copy-btn svg{width:11px; height:11px;}

  .msg-actions{display:flex; gap:4px; margin-top:6px; opacity:0; transition:opacity .15s;}
  .bot-row:hover .msg-actions{opacity:1;}
  .mini-btn{
    background:transparent; border:none; color:var(--ink-faint); cursor:pointer; padding:4px 6px; border-radius:6px;
    display:flex; align-items:center; gap:4px; font-size:.72rem;
  }
  .mini-btn:hover{color:var(--ink); background:var(--paper-sunken);}
  .mini-btn svg{width:13px; height:13px;}

  .typing-dots{display:flex; gap:4px; padding:8px 0;}
  .typing-dots span{
    width:6px; height:6px; border-radius:50%; background:var(--ink-faint); display:inline-block;
    animation:dotPulse 1.1s infinite ease-in-out;
  }
  .typing-dots span:nth-child(2){animation-delay:.15s;}
  .typing-dots span:nth-child(3){animation-delay:.3s;}
  @keyframes dotPulse{0%,80%,100%{transform:translateY(0); opacity:.4;} 40%{transform:translateY(-4px); opacity:1;}}

  /* ---------- Canvas panel ---------- */
  .canvas-container{
    width:0; display:none; flex-direction:column; border-left:1px solid var(--border);
    background:var(--paper-sunken); transition:width .25s ease;
  }
  .canvas-container.active{width:46%; display:flex;}
  .canvas-tools{
    padding:10px 14px; display:flex; align-items:center; gap:10px; border-bottom:1px solid var(--border);
    flex-wrap:wrap; background:var(--paper-raised);
  }
  .swatches{display:flex; gap:6px; align-items:center;}
  .swatch{
    width:22px; height:22px; border-radius:50%; border:2px solid var(--paper-raised); cursor:pointer;
    box-shadow:0 0 0 1px var(--border); transition:transform .1s;
  }
  .swatch.selected{box-shadow:0 0 0 2px var(--accent); transform:scale(1.08);}
  .color-custom{width:24px; height:24px; border:none; padding:0; border-radius:50%; cursor:pointer; background:none;}
  .range-wrap{display:flex; align-items:center; gap:6px;}
  .range-wrap input[type="range"]{width:74px; accent-color:var(--accent);}
  .brush-preview{width:16px; height:16px; border-radius:50%; background:var(--ink); flex:none;}
  .canvas-spacer{flex:1;}
  .icon-only{
    background:transparent; border:1px solid var(--border); color:var(--ink-soft); width:32px; height:32px;
    border-radius:8px; cursor:pointer; display:flex; align-items:center; justify-content:center;
  }
  .icon-only:hover{color:var(--ink); border-color:var(--accent);}
  .icon-only:disabled{opacity:.35; cursor:default;}
  .icon-only svg{width:15px; height:15px;}
  .canvas-stage{flex:1; position:relative; background:
    linear-gradient(var(--border) 1px, transparent 1px) 0 0/100% 28px,
    linear-gradient(90deg, var(--border) 1px, transparent 1px) 0 0/28px 100%;
    background-color:var(--paper);
    opacity:1;
  }
  [data-theme="dark"] .canvas-stage{background-color:var(--paper);}
  canvas{position:absolute; inset:0; cursor:crosshair; touch-action:none;}

  /* ---------- Input ---------- */
  .input-container{padding:16px 20px 20px; display:flex; justify-content:center; background:var(--paper); flex:none;}
  .input-box{
    width:100%; max-width:760px; background:var(--paper-raised); border:1px solid var(--border);
    border-radius:26px; display:flex; align-items:flex-end; padding:8px 8px 8px 18px; box-shadow:var(--shadow);
    transition:border-color .15s;
  }
  .input-box:focus-within{border-color:var(--accent);}
  textarea{
    flex:1; background:transparent; border:none; color:var(--ink); padding:10px 6px; outline:none;
    resize:none; max-height:140px; font-size:.95rem; line-height:1.4;
  }
  textarea::placeholder{color:var(--ink-faint);}
  .icon-btn{
    background:transparent; border:none; color:var(--ink-soft); font-size:1.05rem; width:38px; height:38px;
    border-radius:50%; cursor:pointer; display:flex; align-items:center; justify-content:center; flex:none;
  }
  .icon-btn svg{width:19px; height:19px;}
  .icon-btn:hover{background:var(--paper-sunken); color:var(--ink);}
  #sendBtn{background:var(--accent); color:#fff;}
  #sendBtn:hover{background:var(--accent-strong);}
  #sendBtn:disabled{opacity:.35; cursor:default;}
  #micBtn.recording{color:var(--danger); animation:micPulse 1s infinite;}
  @keyframes micPulse{50%{opacity:.55; transform:scale(1.12);}}
  .rec-badge{
    display:flex; align-items:center; gap:6px; font-size:.78rem; color:var(--danger); padding:0 4px;
  }
  .rec-badge .dot{width:7px; height:7px; border-radius:50%; background:var(--danger); animation:micPulse 1s infinite;}
  .input-hint{font-size:.72rem; color:var(--ink-faint); text-align:center; margin-top:8px; max-width:760px; width:100%;}

  /* ---------- Mobile ---------- */
  .scrim{display:none; position:fixed; inset:0; background:rgba(0,0,0,.35); z-index:30;}
  @media (max-width:860px){
    .sidebar{
      position:fixed; left:0; top:0; height:100%; z-index:40; transform:translateX(-100%);
      box-shadow:0 0 24px rgba(0,0,0,.2);
    }
    .sidebar.open{transform:translateX(0);}
    .scrim.show{display:block;}
    .menu-toggle{display:flex;}
    .canvas-container.active{position:absolute; width:100%; height:100%; top:0; left:0; z-index:20;}
    .top-title{display:none;}
  }
</style>
</head>
<body>

<div class="scrim" id="scrim" onclick="closeSidebar()"></div>

<aside class="sidebar" id="sidebar">
  <div class="brand">
    <svg class="brand-mark" viewBox="0 0 40 40" fill="none">
      <circle cx="20" cy="20" r="19" stroke="var(--accent)" stroke-width="1.4"/>
      <path d="M20 9 L20 31 M11 14 Q20 20 29 14 M11 26 Q20 20 29 26" stroke="var(--accent)" stroke-width="1.4" stroke-linecap="round"/>
      <circle cx="20" cy="20" r="2.6" fill="var(--warm)"/>
    </svg>
    <div>
      <div class="brand-name">Mürekkep</div>
      <div class="brand-sub">AI Asistan</div>
    </div>
  </div>

  <button class="side-btn" onclick="clearChat()">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 5v14M5 12h14"/></svg>
    Yeni Sohbet
  </button>

  <div class="side-divider"></div>
  <div class="side-label">Geçmiş</div>
  <div class="history-empty">
    Bu oturumda henüz kayıtlı bir konuşma yok. Yeni bir sohbet başlattığında burada görünür.
  </div>

  <div class="sidebar-foot">
    <button class="ghost-btn" id="themeToggle" onclick="toggleTheme()">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 3a9 9 0 109 9 7 7 0 01-9-9z"/></svg>
      <span id="themeLabel">Koyu Tema</span>
    </button>
  </div>
</aside>

<div class="main-content">
  <div class="top-nav">
    <div class="top-left">
      <button class="menu-toggle" onclick="openSidebar()" aria-label="Menüyü aç">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 6h16M4 12h16M4 18h16"/></svg>
      </button>
      <span class="top-title">Sohbet · <b>Mürekkep</b></span>
    </div>
    <button class="tool-btn" id="canvasToggleBtn" onclick="toggleCanvas()">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 19l7-7 3 3-7 7-3-3z"/><path d="M18 13l-1.5-7.5L2 2l3.5 14.5L13 18l5-5z"/><path d="M2 2l7.586 7.586"/><circle cx="11" cy="11" r="2"/></svg>
      Çizim Tahtası
    </button>
  </div>

  <div class="workspace">
    <div class="chat-container" id="scrollArea">
      <div class="chat-box" id="chatBox">
        <div class="empty-state" id="emptyState">
          <svg class="brand-mark" viewBox="0 0 40 40" fill="none">
            <circle cx="20" cy="20" r="19" stroke="var(--accent)" stroke-width="1.4"/>
            <path d="M20 9 L20 31 M11 14 Q20 20 29 14 M11 26 Q20 20 29 26" stroke="var(--accent)" stroke-width="1.4" stroke-linecap="round"/>
            <circle cx="20" cy="20" r="2.6" fill="var(--warm)"/>
          </svg>
          <h1>Ne üzerinde çalışıyoruz?</h1>
          <p>Yazabilir, sesle anlatabilir ya da çizim tahtasında bir fikir taslağı çıkarabilirsin.</p>
        </div>
        <div class="message-row bot-row" id="typingRow" style="display:none;">
          <div class="bot-avatar">
            <svg viewBox="0 0 24 24" fill="none"><path d="M12 4 L12 20 M6 8 Q12 12 18 8 M6 16 Q12 12 18 16" stroke="var(--accent)" stroke-width="1.6" stroke-linecap="round"/></svg>
          </div>
          <div class="message"><div class="typing-dots"><span></span><span></span><span></span></div></div>
        </div>
      </div>
    </div>

    <div class="canvas-container" id="canvasPanel">
      <div class="canvas-tools">
        <div class="swatches" id="swatches"></div>
        <input type="color" class="color-custom" id="customColor" value="#1c1b1a" title="Özel renk">
        <div class="range-wrap" title="Fırça kalınlığı">
          <div class="brush-preview" id="brushPreview"></div>
          <input type="range" id="brushSize" min="1" max="28" value="3">
        </div>
        <div class="canvas-spacer"></div>
        <button class="icon-only" id="undoBtn" title="Geri al" onclick="undoCanvas()">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 14l-4-4 4-4M5 10h9a5 5 0 010 10h-1"/></svg>
        </button>
        <button class="icon-only" id="eraserBtn" title="Silgi" onclick="toggleEraser()">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M16 3l5 5-9.5 9.5H6L3 14l9.5-9.5L16 3z"/><path d="M6 17.5h13"/></svg>
        </button>
        <button class="icon-only" title="Temizle" onclick="clearCanvas()">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 6h18M8 6V4h8v2M19 6l-1 14H6L5 6"/></svg>
        </button>
        <button class="icon-only" title="PNG indir" onclick="downloadCanvas()">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 3v12m0 0l-4-4m4 4l4-4M5 21h14"/></svg>
        </button>
        <button class="icon-only" title="Kapat" onclick="toggleCanvas()">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M6 6l12 12M18 6L6 18"/></svg>
        </button>
      </div>
      <div class="canvas-stage">
        <canvas id="canvas"></canvas>
      </div>
    </div>
  </div>

  <div class="input-container">
    <div style="width:100%; max-width:760px; display:flex; flex-direction:column; align-items:center;">
      <div class="input-box">
        <button class="icon-btn" id="micBtn" onclick="toggleMic()" aria-label="Sesle yaz">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 1a3 3 0 00-3 3v7a3 3 0 006 0V4a3 3 0 00-3-3z"/><path d="M19 11a7 7 0 01-14 0M12 18v4"/></svg>
        </button>
        <textarea id="userInput" rows="1" placeholder="Mesajını yaz…" oninput="autoGrow(this)" onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();sendMessage();}"></textarea>
        <button class="icon-btn" id="sendBtn" onclick="sendMessage()" aria-label="Gönder" disabled>
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><path d="M5 12h14M13 6l6 6-6 6"/></svg>
        </button>
      </div>
      <div class="input-hint" id="inputHint">Gönder için Enter, yeni satır için Shift+Enter</div>
    </div>
  </div>
</div>

<script>
  const webhookUrl = "https://mekanikai-n8n.hf.space/webhook/9e29da52-df43-4d7a-a240-7abe603e95da";

  /* ---------- THEME ---------- */
  const themeLabel = document.getElementById('themeLabel');
  function applyTheme(t){
    document.body.setAttribute('data-theme', t);
    themeLabel.textContent = t === 'dark' ? 'Açık Tema' : 'Koyu Tema';
  }
  applyTheme(localStorage.getItem('theme') || 'light');
  function toggleTheme(){
    const next = document.body.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
    applyTheme(next);
    localStorage.setItem('theme', next);
  }

  /* ---------- SIDEBAR (mobile) ---------- */
  const sidebar = document.getElementById('sidebar'), scrim = document.getElementById('scrim');
  function openSidebar(){ sidebar.classList.add('open'); scrim.classList.add('show'); }
  function closeSidebar(){ sidebar.classList.remove('open'); scrim.classList.remove('show'); }

  /* ---------- CHAT ---------- */
  const escapeHTML = str => str.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");

  function renderMarkdownLite(raw){
    const text = escapeHTML(raw);
    const blocks = [];
    let withPlaceholders = text.replace(/```([\s\S]*?)```/g, (m, code) => {
      const idx = blocks.length;
      blocks.push(code.replace(/^\n/, '').replace(/\n$/, ''));
      return `__CODEBLOCK_${idx}__`;
    });
    withPlaceholders = withPlaceholders
      .replace(/`([^`]+)`/g, '<code>$1</code>')
      .replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>');

    const lines = withPlaceholders.split('\n');
    let html = '', inList = false;
    for(const line of lines){
      const li = line.match(/^\s*[-*]\s+(.*)/);
      if(li){
        if(!inList){ html += '<ul>'; inList = true; }
        html += `<li>${li[1]}</li>`;
      } else {
        if(inList){ html += '</ul>'; inList = false; }
        if(line.trim() === '') html += '';
        else html += `<p>${line}</p>`;
      }
    }
    if(inList) html += '</ul>';

    html = html.replace(/__CODEBLOCK_(\d+)__/g, (m, i) => {
      const code = blocks[i];
      return `<div class="code-block"><pre>${code}</pre><button class="copy-btn" onclick="copyCode(this)">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="9" width="11" height="11" rx="1.5"/><path d="M5 15V5a1.5 1.5 0 011.5-1.5H15"/></svg>Kopyala</button></div>`;
    });
    return html || '<p></p>';
  }

  function copyCode(btn){
    const code = btn.previousElementSibling.innerText;
    navigator.clipboard.writeText(code).then(() => {
      const original = btn.innerHTML;
      btn.innerHTML = 'Kopyalandı';
      setTimeout(() => btn.innerHTML = original, 1200);
    });
  }

  function copyMessage(btn){
    const msg = btn.closest('.message-row').querySelector('.message').innerText;
    navigator.clipboard.writeText(msg);
    const original = btn.innerHTML;
    btn.innerHTML = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M5 12l5 5L20 7"/></svg>';
    setTimeout(() => btn.innerHTML = original, 1200);
  }

  const botAvatarSVG = `<div class="bot-avatar"><svg viewBox="0 0 24 24" fill="none"><path d="M12 4 L12 20 M6 8 Q12 12 18 8 M6 16 Q12 12 18 16" stroke="var(--accent)" stroke-width="1.6" stroke-linecap="round"/></svg></div>`;
  const copyIconSVG = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="9" width="11" height="11" rx="1.5"/><path d="M5 15V5a1.5 1.5 0 011.5-1.5H15"/></svg>`;

  function hideEmptyState(){
    const es = document.getElementById('emptyState');
    if(es) es.remove();
  }

  function appendMsg(sender, text){
    hideEmptyState();
    const box = document.getElementById("chatBox");
    const row = document.createElement("div");
    row.className = `message-row ${sender}-row`;
    if(sender === 'bot'){
      row.innerHTML = `${botAvatarSVG}<div>
        <div class="message">${renderMarkdownLite(text)}</div>
        <div class="msg-actions">
          <button class="mini-btn" onclick="copyMessage(this)">${copyIconSVG} Kopyala</button>
        </div>
      </div>`;
    } else {
      row.innerHTML = `<div class="message">${escapeHTML(text)}</div>`;
    }
    box.insertBefore(row, document.getElementById("typingRow"));
    scrollToBottom();
  }

  function scrollToBottom(){
    const area = document.getElementById("scrollArea");
    requestAnimationFrame(() => area.scrollTop = area.scrollHeight);
  }

  async function sendMessage(){
    const input = document.getElementById("userInput");
    const msg = input.value.trim();
    if(!msg) return;
    appendMsg("user", msg);
    input.value = ""; autoGrow(input);
    document.getElementById("typingRow").style.display = "flex";
    scrollToBottom();

    try{
      const res = await fetch(`${webhookUrl}?message=${encodeURIComponent(msg)}`);
      let rawData = res.ok ? await res.text() : "Sunucudan yanıt alınamadı (HTTP hata).";
      let finalData = rawData;
      try{
        const j = JSON.parse(rawData);
        finalData = (Array.isArray(j) && j[0]?.output) ? j[0].output : (j.output || rawData);
      } catch(e){}
      appendMsg("bot", finalData.replace(/<think>[\s\S]*?<\/think>\n*/g, '').trim());
    } catch {
      appendMsg("bot", "Bağlantı hatası oluştu. Bağlantını kontrol edip tekrar dener misin?");
    }
    document.getElementById("typingRow").style.display = "none";
  }

  function clearChat(){
    document.getElementById("chatBox").innerHTML = `
      <div class="empty-state" id="emptyState">
        <svg class="brand-mark" viewBox="0 0 40 40" fill="none">
          <circle cx="20" cy="20" r="19" stroke="var(--accent)" stroke-width="1.4"/>
          <path d="M20 9 L20 31 M11 14 Q20 20 29 14 M11 26 Q20 20 29 26" stroke="var(--accent)" stroke-width="1.4" stroke-linecap="round"/>
          <circle cx="20" cy="20" r="2.6" fill="var(--warm)"/>
        </svg>
        <h1>Ne üzerinde çalışıyoruz?</h1>
        <p>Yazabilir, sesle anlatabilir ya da çizim tahtasında bir fikir taslağı çıkarabilirsin.</p>
      </div>
      <div class="message-row bot-row" id="typingRow" style="display:none;">
        ${botAvatarSVG}<div class="message"><div class="typing-dots"><span></span><span></span><span></span></div></div>
      </div>`;
    closeSidebar();
  }

  function autoGrow(el){
    el.style.height = 'auto';
    el.style.height = el.scrollHeight + 'px';
    document.getElementById('sendBtn').disabled = el.value.trim() === '';
  }

  /* ---------- MIC ---------- */
  let recognition, isRec = false;
  const micBtn = document.getElementById('micBtn');
  if(window.SpeechRecognition || window.webkitSpeechRecognition){
    recognition = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
    recognition.lang = 'tr-TR';
    recognition.onresult = e => {
      document.getElementById("userInput").value = e.results[0][0].transcript;
      sendMessage();
    };
    recognition.onend = () => { isRec = false; micBtn.classList.remove("recording"); };
  }
  function toggleMic(){
    if(!recognition) return alert("Tarayıcın ses tanımayı desteklemiyor.");
    if(isRec) recognition.stop();
    else { recognition.start(); isRec = true; micBtn.classList.add("recording"); }
  }

  /* ---------- CANVAS ---------- */
  const canvas = document.getElementById('canvas'), ctx = canvas.getContext('2d');
  const canvasPanel = document.getElementById('canvasPanel');
  const canvasToggleBtn = document.getElementById('canvasToggleBtn');
  let isDrawing = false, currentColor = '#1c1b1a', brushSize = 3, isEraser = false;
  let undoStack = [];

  const palette = ['#1c1b1a', '#2f4f6f', '#c8662f', '#b3433a', '#3f7d5c', '#7a5fa0'];
  const swatchWrap = document.getElementById('swatches');
  palette.forEach((c, i) => {
    const s = document.createElement('div');
    s.className = 'swatch' + (i === 0 ? ' selected' : '');
    s.style.background = c;
    s.onclick = () => selectColor(c, s);
    swatchWrap.appendChild(s);
  });
  function selectColor(c, el){
    currentColor = c; isEraser = false;
    document.querySelectorAll('.swatch').forEach(s => s.classList.remove('selected'));
    if(el) el.classList.add('selected');
    document.getElementById('eraserBtn').style.color = '';
    updateBrushPreview();
  }
  document.getElementById('customColor').addEventListener('input', e => {
    document.querySelectorAll('.swatch').forEach(s => s.classList.remove('selected'));
    selectColor(e.target.value, null);
  });
  document.getElementById('brushSize').addEventListener('input', e => {
    brushSize = +e.target.value;
    updateBrushPreview();
  });
  function updateBrushPreview(){
    const p = document.getElementById('brushPreview');
    const size = Math.max(6, Math.min(22, brushSize));
    p.style.width = size + 'px'; p.style.height = size + 'px';
    p.style.background = isEraser ? 'var(--paper)' : currentColor;
    p.style.border = isEraser ? '1px solid var(--ink-faint)' : 'none';
  }
  function toggleEraser(){
    isEraser = !isEraser;
    document.getElementById('eraserBtn').style.color = isEraser ? 'var(--warm)' : '';
    document.getElementById('eraserBtn').style.borderColor = isEraser ? 'var(--warm)' : '';
    updateBrushPreview();
  }

  function toggleCanvas(){
    canvasPanel.classList.toggle('active');
    const open = canvasPanel.classList.contains('active');
    canvasToggleBtn.classList.toggle('active', open);
    if(open){
      const stage = canvasPanel.querySelector('.canvas-stage');
      canvas.width = stage.clientWidth;
      canvas.height = stage.clientHeight;
      updateBrushPreview();
    }
  }

  function snapshot(){
    undoStack.push(canvas.toDataURL());
    if(undoStack.length > 25) undoStack.shift();
  }
  function undoCanvas(){
    if(undoStack.length === 0) return;
    const img = new Image();
    img.onload = () => { ctx.clearRect(0,0,canvas.width,canvas.height); ctx.drawImage(img,0,0); };
    img.src = undoStack.pop();
  }
  function clearCanvas(){
    snapshot();
    ctx.clearRect(0,0,canvas.width,canvas.height);
  }
  function downloadCanvas(){
    const link = document.createElement('a');
    link.download = 'cizim.png';
    link.href = canvas.toDataURL('image/png');
    link.click();
  }

  function drawPos(e){
    const r = canvas.getBoundingClientRect();
    const pt = e.touches ? e.touches[0] : e;
    return { x: pt.clientX - r.left, y: pt.clientY - r.top };
  }
  function startDraw(e){
    e.preventDefault();
    snapshot();
    isDrawing = true;
    const p = drawPos(e);
    ctx.beginPath();
    ctx.moveTo(p.x, p.y);
  }
  function endDraw(){ isDrawing = false; ctx.beginPath(); }
  function draw(e){
    if(!isDrawing) return;
    e.preventDefault();
    const p = drawPos(e);
    ctx.lineWidth = brushSize;
    ctx.lineCap = 'round';
    ctx.lineJoin = 'round';
    if(isEraser){
      ctx.globalCompositeOperation = 'destination-out';
      ctx.strokeStyle = 'rgba(0,0,0,1)';
    } else {
      ctx.globalCompositeOperation = 'source-over';
      ctx.strokeStyle = currentColor;
    }
    ctx.lineTo(p.x, p.y);
    ctx.stroke();
    ctx.beginPath();
    ctx.moveTo(p.x, p.y);
  }
  canvas.addEventListener('mousedown', startDraw);
  canvas.addEventListener('mouseup', endDraw);
  canvas.addEventListener('mouseleave', endDraw);
  canvas.addEventListener('mousemove', draw);
  canvas.addEventListener('touchstart', startDraw, {passive:false});
  canvas.addEventListener('touchend', endDraw);
  canvas.addEventListener('touchmove', draw, {passive:false});

  window.addEventListener('resize', () => {
    if(canvasPanel.classList.contains('active')){
      const stage = canvasPanel.querySelector('.canvas-stage');
      const data = canvas.toDataURL();
      canvas.width = stage.clientWidth;
      canvas.height = stage.clientHeight;
      const img = new Image();
      img.onload = () => ctx.drawImage(img, 0, 0);
      img.src = data;
    }
  });

  updateBrushPreview();
</script>
</body>
</html>
