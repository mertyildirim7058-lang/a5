<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sohbet Arayüzü</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: #f4f7f6;
            margin: 0;
        }
        .chat-container {
            width: 400px;
            background: #ffffff;
            border-radius: 10px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        .chat-header {
            background: #007bff;
            color: white;
            padding: 15px;
            text-align: center;
            font-weight: bold;
            font-size: 1.1em;
        }
        .chat-box {
            height: 400px;
            padding: 15px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 10px;
            background: #fafafa;
        }
        .message {
            padding: 10px 15px;
            border-radius: 15px;
            max-width: 75%;
            word-wrap: break-word;
            font-size: 0.95em;
        }
        .user {
            background: #007bff;
            color: white;
            align-self: flex-end;
            border-bottom-right-radius: 2px;
        }
        .bot {
            background: #e2e8f0;
            color: #333;
            align-self: flex-start;
            border-bottom-left-radius: 2px;
        }
        .input-area {
            display: flex;
            padding: 15px;
            background: #ffffff;
            border-top: 1px solid #eee;
        }
        input {
            flex: 1;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 20px;
            outline: none;
            padding-left: 15px;
        }
        input:focus {
            border-color: #007bff;
        }
        button {
            margin-left: 10px;
            padding: 10px 20px;
            background: #007bff;
            color: white;
            border: none;
            border-radius: 20px;
            cursor: pointer;
            font-weight: bold;
            transition: background 0.3s;
        }
        button:hover {
            background: #0056b3;
        }
    </style>
</head>
<body>

<div class="chat-container">
    <div class="chat-header">Asistan</div>
    <div class="chat-box" id="chatBox">
        <div class="message bot">Merhaba! Sistem hazır, mesajınızı yazabilirsiniz.</div>
    </div>
    <div class="input-area">
        <input type="text" id="userInput" placeholder="Mesajınızı yazın..." onkeypress="handleKeyPress(event)">
        <button onclick="sendMessage()">Gönder</button>
    </div>
</div>

<script>
    // Hedef Webhook URL'niz
    const webhookUrl = "https://mekanikai-n8n.hf.space/webhook/9e29da52-df43-4d7a-a240-7abe603e95da";

    function appendMessage(sender, text) {
        const chatBox = document.getElementById("chatBox");
        const msgDiv = document.createElement("div");
        msgDiv.className = `message ${sender}`;
        msgDiv.innerText = text;
        chatBox.appendChild(msgDiv);
        chatBox.scrollTop = chatBox.scrollHeight;
    }

    async function sendMessage() {
        const input = document.getElementById("userInput");
        const message = input.value.trim();
        
        if (!message) return;

        // Kullanıcı mesajını arayüze ekle
        appendMessage("user", message);
        input.value = "";

        try {
            // GET isteği olduğu için mesajı URL'ye query parametresi olarak ekliyoruz
            const fetchUrl = `${webhookUrl}?message=${encodeURIComponent(message)}`;
            
            // Webhook'a GET isteği atma
            const response = await fetch(fetchUrl, {
                method: 'GET',
                // Eğer webhook'unuzun CORS politikası farklıysa 'mode: no-cors' eklemeniz gerekebilir.
            });

            if (response.ok) {
                // Sunucudan gelen yanıtı bot mesajı olarak göster
                const data = await response.text();
                appendMessage("bot", data ? data : "İstek başarıyla iletildi (Yanıt boş).");
            } else {
                appendMessage("bot", `Sunucu Hatası: ${response.status}`);
            }
        } catch (error) {
            appendMessage("bot", `Bağlantı Hatası: Webhook'a ulaşılamadı. (${error.message})`);
        }
    }

    function handleKeyPress(event) {
        if (event.key === "Enter") {
            sendMessage();
        }
    }
</script>

</body>
</html>
