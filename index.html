<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AI Asistan</title>
    <style>
        /* Modern AI Teması Renk Paleti */
        :root {
            --bg-main: #f0f4f9;
            --bg-sidebar: #e9eef6;
            --bg-chat: #ffffff;
            --text-main: #1f1f1f;
            --text-muted: #444746;
            --user-bubble: #e3e3e3;
            --accent-color: #0b57d0;
            --accent-hover: #0842a0;
            --input-bg: #ffffff;
            --border-color: #c4c7c5;
        }

        [data-theme="dark"] {
            --bg-main: #131314;
            --bg-sidebar: #1e1f20;
            --bg-chat: #131314;
            --text-main: #e3e3e3;
            --text-muted: #c4c7c5;
            --user-bubble: #333537;
            --accent-color: #a8c7fa;
            --accent-hover: #7cb0f9;
            --input-bg: #1e1f20;
            --border-color: #444746;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            transition: background-color 0.3s, color 0.3s;
        }

        body {
            background-color: var(--bg-main);
            color: var(--text-main);
            height: 100vh;
            display: flex;
            overflow: hidden;
        }

        /* --- YAN MENÜ (SİDEBAR) --- */
        .sidebar {
            width: 280px;
            background-color: var(--bg-sidebar);
            display: flex;
            flex-direction: column;
            padding: 20px;
            border-right: 1px solid var(--border-color);
            transition: transform 0.3s ease;
        }

        .new-chat-btn {
            background-color: var(--bg-chat);
            color: var(--text-main);
            border: 1px solid var(--border-color);
            padding: 12px 20px;
            border-radius: 50px;
            cursor: pointer;
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 0.95rem;
            margin-bottom: 20px;
        }

        .new-chat-btn:hover { background-color: var(--border-color); }

        .history-list {
            flex: 1;
            overflow-y: auto;
        }

        .theme-btn {
            background: transparent;
            border: none;
            color: var(--text-main);
            cursor: pointer;
            padding: 10px;
            display: flex;
            align-items: center;
            gap: 10px;
            border-radius: 8px;
        }
        .theme-btn:hover { background-color: rgba(0,0,0,0.05); }
        [data-theme="dark"] .theme-btn:hover { background-color: rgba(255,255,255,0.05); }

        /* --- ANA İÇERİK ALANI --- */
        .main-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            position: relative;
            background-color: var(--bg-chat);
        }

        .top-nav {
            padding: 15px 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .hamburger {
            background: transparent;
            border: none;
            color: var(--text-main);
            font-size: 1.5rem;
            cursor: pointer;
            display: none; /* Mobilde açılacak */
        }

        .brand { font-size: 1.2rem; font-weight: 500; color: var(--text-muted); }

        /* --- SOHBET ALANI --- */
        .chat-container {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .chat-box {
            width: 100%;
            max-width: 800px; /* Okunabilir maksimum genişlik */
            display: flex;
            flex-direction: column;
            gap: 30px;
            padding-bottom: 20px;
        }

        .message-row {
            display: flex;
            width: 100%;
            animation: fadeIn 0.4s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Kullanıcı Mesajı: Sağda, Balon İçinde */
        .user-row { justify-content: flex-end; }
        .user-row .message {
            background-color: var(--user-bubble);
            padding: 12px 20px;
            border-radius: 24px;
            max-width: 80%;
            font-size: 1rem;
            line-height: 1.5;
        }

        /* Bot Mesajı: Solda, Şeffaf Arka Plan, İkonlu */
        .bot-row { justify-content: flex-start; gap: 15px; }
        .bot-avatar {
            width: 36px;
            height: 36px;
            background: linear-gradient(135deg, #0b57d0, #a8c7fa);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            flex-shrink: 0;
            font-size: 1.2rem;
        }
        .bot-row .message {
            max-width: 90%;
            font-size: 1rem;
            line-height: 1.6;
            padding-top: 5px;
        }

        /* --- GİRİŞ ALANI --- */
        .input-container {
            padding: 20px;
            display: flex;
            justify-content: center;
            background: linear-gradient(to top, var(--bg-chat) 70%, transparent);
        }

        .input-box {
            width: 100%;
            max-width: 800px;
            background-color: var(--input-bg);
            border: 1px solid var(--border-color);
            border-radius: 30px;
            display: flex;
            align-items: flex-end;
            padding: 10px 15px;
            box-shadow: 0 2px 6px rgba(0,0,0,0.05);
        }

        textarea {
            flex: 1;
            background: transparent;
            border: none;
            color: var(--text-main);
            font-size: 1rem;
            padding: 10px;
            resize: none;
            outline: none;
            max-height: 150px;
            min-height: 24px;
            overflow-y: auto;
        }

        .send-btn {
            background: transparent;
            border: none;
            color: var(--accent-color);
            font-size: 1.5rem;
            padding: 10px;
            cursor: pointer;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .send-btn:hover { background-color: rgba(0,0,0,0.05); }
        .send-btn:disabled { color: var(--text-muted); cursor: not-allowed; }

        /* Yazıyor Animasyonu */
        .typing-indicator { display: none; align-items: center; gap: 5px; padding-top: 10px; }
        .typing-indicator span {
            width: 8px; height: 8px; background: var(--text-muted); border-radius: 50%;
            animation: bounce 1.4s infinite ease-in-out;
        }
        .typing-indicator span:nth-child(1) { animation-delay: -0.32s; }
        .typing-indicator span:nth-child(2) { animation-delay: -0.16s; }
        @keyframes bounce { 0%, 80%, 100% { transform: scale(0); } 40% { transform: scale(1); } }

        /* --- MOBİL UYUM (RESPONSIVE) --- */
        @media (max-width: 768px) {
            .sidebar {
                position: absolute;
                z-index: 100;
                height: 100%;
                transform: translateX(-100%);
                width: 250px;
            }
            .sidebar.active { transform: translateX(0); box-shadow: 2px 0 10px rgba(0,0,0,0.2); }
            .top-nav .hamburger { display: block; }
            .bot-row .message { max-width: 100%; }
            .input-box { border-radius: 20px; }
        }
    </style>
</head>
<body>

<div class="sidebar" id="sidebar">
    <button class="new-chat-btn" onclick="clearChat()">
        ➕ Yeni Sohbet
    </button>
    <div class="history-list">
        </div>
    <button class="theme-btn" onclick="toggleTheme()" id="themeBtn">
        🌓 Temayı Değiştir
    </button>
</div>

<div class="main-content">
    <div class="top-nav">
        <button class="hamburger" onclick="toggleSidebar()">☰</button>
        <span class="brand">✨ AI Asistan</span>
        <div style="width: 24px;"></div> </div>

    <div class="chat-container" id="scrollArea">
        <div class="chat-box" id="chatBox">
            <div class="message-row bot-row">
                <div class="bot-avatar">✨</div>
                <div class="message">Merhaba! Bugün sana nasıl yardımcı olabilirim?</div>
            </div>
            
            <div class="message-row bot-row" id="typingRow" style="display: none;">
                <div class="bot-avatar">✨</div>
                <div class="typing-indicator">
                    <span></span><span></span><span></span>
                </div>
            </div>
        </div>
    </div>

    <div class="input-container">
        <div class="input-box">
            <textarea 
                id="userInput" 
                rows="1" 
                placeholder="Mesajınızı buraya yazın..." 
                oninput="autoResize(this)"
                onkeydown="handleKeyPress(event)"
            ></textarea>
            <button class="send-btn" id="sendBtn" onclick="sendMessage()">➤</button>
        </div>
    </div>
</div>

<script>
    const webhookUrl = "https://mekanikai-n8n.hf.space/webhook/9e29da52-df43-4d7a-a240-7abe603e95da";

    // Tema Ayarları
    function initTheme() {
        const savedTheme = localStorage.getItem('theme') || 'dark';
        document.body.setAttribute('data-theme', savedTheme);
    }

    function toggleTheme() {
        const currentTheme = document.body.getAttribute('data-theme');
        const newTheme = currentTheme === 'light' ? 'dark' : 'light';
        document.body.setAttribute('data-theme', newTheme);
        localStorage.setItem('theme', newTheme);
    }

    // Mobil Menü Aç/Kapat
    function toggleSidebar() {
        document.getElementById('sidebar').classList.toggle('active');
    }

    // Textarea otomatik boyutlandırma (Enter'a basınca genişlemesi için)
    function autoResize(textarea) {
        textarea.style.height = 'auto';
        textarea.style.height = textarea.scrollHeight + 'px';
    }

    // Arayüze Mesaj Ekleme
    function appendMessage(sender, text) {
        const chatBox = document.getElementById("chatBox");
        const typingRow = document.getElementById("typingRow");
        
        const rowDiv = document.createElement("div");
        rowDiv.className = `message-row ${sender === 'user' ? 'user-row' : 'bot-row'}`;
        
        if (sender === 'bot') {
            rowDiv.innerHTML = `
                <div class="bot-avatar">✨</div>
                <div class="message">${formatText(text)}</div>
            `;
        } else {
            rowDiv.innerHTML = `<div class="message">${text}</div>`;
        }

        chatBox.insertBefore(rowDiv, typingRow);
        scrollToBottom();
    }

    // Basit metin formatlama (Satır atlamalarını HTML'e çevirme)
    function formatText(text) {
        return text.replace(/\n/g, '<br>');
    }

    function scrollToBottom() {
        const scrollArea = document.getElementById("scrollArea");
        scrollArea.scrollTo({ top: scrollArea.scrollHeight, behavior: 'smooth' });
    }

    function setWaitState(isWaiting) {
        const input = document.getElementById('userInput');
        const btn = document.getElementById('sendBtn');
        const typing = document.getElementById('typingRow');
        
        input.disabled = isWaiting;
        btn.disabled = isWaiting;
        typing.style.display = isWaiting ? 'flex' : 'none';
        
        if (isWaiting) scrollToBottom();
        else {
            input.focus();
            input.style.height = 'auto'; // Textarea'yı sıfırla
        }
    }

    async function sendMessage() {
        const input = document.getElementById("userInput");
        const message = input.value.trim();
        
        if (!message) return;

        appendMessage("user", message);
        input.value = "";
        
        setWaitState(true);

        try {
            const fetchUrl = `${webhookUrl}?message=${encodeURIComponent(message)}`;
            
            const response = await fetch(fetchUrl, {
                method: 'GET'
            });

            if (response.ok) {
                let data = await response.text();
                
                // <think> ETİKETLERİNİ TEMİZLEYEN FİLTRE (Önceki talebiniz)
                data = data.replace(/<think>[\s\S]*?<\/think>\n*/g, '').trim();

                appendMessage("bot", data ? data : "İşlem tamamlandı.");
            } else {
                appendMessage("bot", `Hata: HTTP ${response.status}`);
            }
        } catch (error) {
            appendMessage("bot", `Bağlantı kurulamadı. Webhook adresini kontrol edin.`);
        } finally {
            setWaitState(false);
        }
    }

    function handleKeyPress(event) {
        // Sadece Enter'a basılırsa (Shift+Enter alt satıra geçer)
        if (event.key === "Enter" && !event.shiftKey) {
            event.preventDefault();
            if (!document.getElementById('sendBtn').disabled) {
                sendMessage();
            }
        }
    }

    function clearChat() {
        const chatBox = document.getElementById("chatBox");
        const typingRow = document.getElementById("typingRow");
        
        chatBox.innerHTML = '';
        
        // Karşılama mesajını ve typing indicator'ı geri ekle
        chatBox.innerHTML = `
            <div class="message-row bot-row">
                <div class="bot-avatar">✨</div>
                <div class="message">Yeni bir sohbet başlattınız. Size nasıl yardımcı olabilirim?</div>
            </div>
        `;
        chatBox.appendChild(typingRow);
        
        // Mobilde menüyü kapat
        document.getElementById('sidebar').classList.remove('active');
    }

    window.onload = () => {
        initTheme();
        document.getElementById('userInput').focus();
    };
</script>

</body>
</html>
